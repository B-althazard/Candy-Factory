<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#f6f6f6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Character Creator" />
  <title>Character Creator</title>

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="./icons/icon-192.png" />

  <style>
    :root{
      --dark:#282a29;
      --light-gray:#f6f6f6;
      --white:#ffffff;
      --radius:18px;
    }
    *{box-sizing:border-box;margin:0;padding:0;font-family:"Noto Sans",sans-serif;}
    body{background:var(--light-gray);color:var(--dark);padding:20px;max-width:480px;margin:auto;}
    header{margin-bottom:18px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
    h1{font-size:28px;font-weight:700;line-height:1.1;}
    .subtitle{font-size:14px;opacity:.6;margin-top:6px;}
    .top-actions{display:flex;flex-direction:column;gap:8px;align-items:flex-end;}
    .badge{display:inline-flex;align-items:center;gap:8px;padding:8px 10px;border-radius:14px;background:var(--white);border:1px solid #e7e7e7;font-size:12px;opacity:.85;}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--dark);}
    .small-btn{background:var(--white);border:1px solid #e7e7e7;color:var(--dark);border-radius:14px;padding:10px 12px;font-size:13px;cursor:pointer;box-shadow:0 6px 16px rgba(0,0,0,.03);}
    .small-btn[disabled]{opacity:.5;cursor:not-allowed;box-shadow:none;}

    .card{background:var(--white);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:0 8px 20px rgba(0,0,0,.04);}
    .section-title{font-size:16px;font-weight:600;margin-bottom:12px;}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    button.option{background:var(--light-gray);border:0;padding:12px;border-radius:14px;cursor:pointer;font-size:14px;transition:.15s;}
    button.option:active{transform:scale(.99);}
    button.option.active{background:var(--dark);color:var(--white);}
    input{width:100%;padding:10px 12px;border-radius:12px;border:1px solid #ddd;background:var(--light-gray);outline:none;}
    input:focus{border-color:#cfcfcf;}
    textarea{width:100%;height:140px;border-radius:12px;border:0;background:var(--light-gray);padding:12px;font-size:13px;resize:none;}
    .primary-btn{background:var(--dark);color:var(--white);border:0;padding:14px;width:100%;border-radius:16px;font-size:16px;font-weight:600;cursor:pointer;margin:10px 0 14px;}
    .primary-btn:active{transform:scale(.99);}
    .muted{opacity:.6;font-size:12px;margin-top:8px;}
  </style>
</head>

<body>
  <header>
    <div>
      <h1>Create Character</h1>
      <div class="subtitle">Customize pose, expression and background</div>
    </div>
    <div class="top-actions">
      <button id="installBtn" class="small-btn" disabled>Install</button>
      <div class="badge" title="PWA status">
        <span class="dot"></span><span id="pwaText">Checking…</span>
      </div>
    </div>
  </header>

  <div class="card">
    <div class="section-title">Basic Info</div>
    <input id="name" placeholder="Character Name" autocomplete="off" />
  </div>

  <div class="card">
    <div class="section-title">Pose</div>
    <div class="grid" data-group="pose">
      <button class="option" data-value="Standing">Standing</button>
      <button class="option" data-value="Sitting">Sitting</button>
      <button class="option" data-value="Action">Action</button>
      <button class="option" data-value="Floating">Floating</button>
    </div>
  </div>

  <div class="card">
    <div class="section-title">Expression</div>
    <div class="grid" data-group="expression">
      <button class="option" data-value="Happy">Happy</button>
      <button class="option" data-value="Serious">Serious</button>
      <button class="option" data-value="Angry">Angry</button>
      <button class="option" data-value="Surprised">Surprised</button>
    </div>
  </div>

  <div class="card">
    <div class="section-title">Background</div>
    <div class="grid" data-group="background">
      <button class="option" data-value="Studio">Studio</button>
      <button class="option" data-value="Forest">Forest</button>
      <button class="option" data-value="City">City</button>
      <button class="option" data-value="Fantasy">Fantasy</button>
    </div>
  </div>

  <div class="card">
    <div class="section-title">Character Attributes</div>
    <input id="age" placeholder="Age" inputmode="numeric" />
    <div style="height:12px"></div>
    <input id="style" placeholder="Art Style (e.g. anime, realistic)" autocomplete="off" />
    <div class="muted">Version 1 outputs key-value pairs. Version 2 can map these to an AI prompt.</div>
  </div>

  <button class="primary-btn" id="genBtn">Generate Key-Value Data</button>

  <div class="card">
    <div class="section-title">Output (Version 1)</div>
    <textarea id="output" readonly></textarea>
  </div>

  <script>
    // -------- UI state --------
    const characterData = {};
    const outputEl = document.getElementById("output");

    function setActive(groupEl, btnEl) {
      groupEl.querySelectorAll(".option").forEach(b => b.classList.remove("active"));
      btnEl.classList.add("active");
    }

    document.querySelectorAll(".grid[data-group]").forEach(groupEl => {
      groupEl.addEventListener("click", (e) => {
        const btn = e.target.closest("button.option");
        if (!btn) return;
        const key = groupEl.getAttribute("data-group");
        const value = btn.getAttribute("data-value");
        setActive(groupEl, btn);
        characterData[key] = value;
      });
    });

    document.getElementById("genBtn").addEventListener("click", () => {
      characterData.name = document.getElementById("name").value.trim();
      characterData.age = document.getElementById("age").value.trim();
      characterData.style = document.getElementById("style").value.trim();
      outputEl.value = JSON.stringify(characterData, null, 2);
    });

    // -------- Service Worker --------
    const pwaText = document.getElementById("pwaText");
    (async function () {
      if (!("serviceWorker" in navigator)) {
        pwaText.textContent = "Service Worker unavailable";
        return;
      }
      try {
        await navigator.serviceWorker.register("./sw.js", { scope: "./" });
        await navigator.serviceWorker.ready;
        pwaText.textContent = "Offline ready";
      } catch (e) {
        pwaText.textContent = "SW registration failed";
      }
    })();

    // -------- Install button --------
    let deferredPrompt = null;
    const installBtn = document.getElementById("installBtn");

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.disabled = false;
    });

    installBtn.addEventListener("click", async () => {
      if (!deferredPrompt) return;
      installBtn.disabled = true;
      deferredPrompt.prompt();
      try { await deferredPrompt.userChoice; } catch (_) {}
      deferredPrompt = null;
    });

    // Installed detection
    (function () {
      const isStandalone =
        window.matchMedia("(display-mode: standalone)").matches ||
        window.navigator.standalone === true;
      if (isStandalone) {
        installBtn.style.display = "none";
        pwaText.textContent = "Installed";
      }
    })();
  </script>
</body>
</html>
